name: Rust Crate Release

on:
  push:
    tags:
      - 'rs-v[0-9]+.[0-9]+.[0-9]+'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --package excel-rs
      - run: cargo clippy --package excel-rs -- -D warnings

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [check]
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Get version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#rs-v}"
          if [[ "$VERSION" == *"-"* ]]; then
            IS_PRERELEASE=true
          else
            IS_PRERELEASE=false
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "is_prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT
      - name: Publish excel-rs
        run: cargo publish --package excel-rs
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Create GitHub release
        uses: release-drafter/release-drafter@v6
        with:
          config-name: release-draft-rs.yml
          name: excel-rs ${{ steps.version.outputs.version }}
          tag: ${{ steps.version.outputs.tag }}
          version: ${{ steps.version.outputs.version }}
          disable-autolabeler: true
          publish: true
          prerelease: ${{ steps.version.outputs.is_prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
