name: CLI Release

on:
  push:
    tags:
      - 'cli-v[0-9]+.[0-9]+.[0-9]+'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64
          - runner: ubuntu-latest
            target: aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --package cli-excel-rs --all-features
      - run: cd target/release && zip ../../excel-rs-linux-${{ matrix.platform.target }}.zip cli-excel-rs
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: excel-rs-linux-${{ matrix.platform.target }}
          path: excel-rs-linux-${{ matrix.platform.target }}.zip

  macos:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-14
            target: x86_64
          - runner: macos-14
            target: aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --package cli-excel-rs --all-features
      - run: cd target/release && zip ../../excel-rs-macos-${{ matrix.platform.target }}.zip cli-excel-rs
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: excel-rs-macos-${{ matrix.platform.target }}
          path: excel-rs-macos-${{ matrix.platform.target }}.zip

  release:
    name: Release
    runs-on: ubuntu-latest
    # Only publish when a cli-v* tag is pushed
    if: startsWith(github.ref, 'refs/tags/cli-v')
    needs: [linux, macos]
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Get version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#cli-v}"
          if [[ "$VERSION" == *"-"* ]]; then
            IS_PRERELEASE=true
          else
            IS_PRERELEASE=false
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "is_prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT
      - uses: actions/download-artifact@v4
      - name: Create GitHub release
        id: github-release
        uses: release-drafter/release-drafter@v6
        with:
          config-name: release-draft-cli.yml
          name: cli-excel-rs ${{ steps.version.outputs.version }}
          tag: ${{ steps.version.outputs.tag }}
          version: ${{ steps.version.outputs.version }}
          disable-autolabeler: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload binaries to GitHub release
        run: gh release upload $TAG $FILES --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          FILES: excel-rs-*/*
      - name: Publish GitHub release
        run: gh release edit $TAG --draft=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
